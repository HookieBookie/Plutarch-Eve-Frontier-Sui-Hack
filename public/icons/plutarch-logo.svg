<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Glow filters -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00F0FF" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="magentaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FF8533" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="purpleHalo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feFlood flood-color="#FF6600" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00F0FF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1d2e" stroke-width="0.5"/>
    </pattern>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="1" opacity="0.15"/>
    </pattern>

    <!-- Clip for glitch slice -->
    <clipPath id="glitchSlice1">
      <rect x="0" y="248" width="800" height="6"/>
    </clipPath>
    <clipPath id="glitchSlice2">
      <rect x="0" y="262" width="800" height="3"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0A0A0F"/>

  <!-- Perspective grid -->
  <g opacity="0.3">
    <rect width="800" height="600" fill="url(#grid)"/>
    <!-- Perspective fade -->
    <rect width="800" height="600" fill="url(#grid)" opacity="0.5" transform="skewY(2)"/>
  </g>

  <!-- Background fade gradient -->
  <rect width="800" height="600" fill="#0A0A0F" opacity="0.6"/>

  <!-- Orange halo behind hex -->
  <ellipse cx="400" cy="220" rx="120" ry="120" filter="url(#purpleHalo)" fill="#FF6600" opacity="0.6"/>

  <!-- Data stream particles (tiny flowing characters) -->
  <g fill="#00F0FF" opacity="0.15" font-family="'Courier New', monospace" font-size="8">
    <text x="180" y="150">0xA7F3</text>
    <text x="560" y="180">0xE1B9</text>
    <text x="140" y="310">7B2F</text>
    <text x="620" y="290">FF2D</text>
    <text x="100" y="200">01</text>
    <text x="670" y="230">00</text>
    <text x="200" y="350">C0:86</text>
    <text x="580" y="340">TX</text>
    <text x="120" y="260">NODE</text>
    <text x="650" y="160">SSU</text>
  </g>

  <!-- Circuit traces from hex -->
  <g stroke="#00F0FF" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#cyanGlow)">
    <!-- Left traces -->
    <polyline points="310,195 260,195 240,175 180,175"/>
    <polyline points="310,245 250,245 230,265 180,265"/>
    <polyline points="330,165 310,140 280,140 240,120"/>
    <polyline points="330,275 300,300 260,300 220,320"/>
    <!-- Right traces -->
    <polyline points="490,195 540,195 560,175 620,175"/>
    <polyline points="490,245 550,245 570,265 620,265"/>
    <polyline points="470,165 490,140 520,140 560,120"/>
    <polyline points="470,275 500,300 540,300 580,320"/>
  </g>

  <!-- Circuit trace endpoints (small dots) -->
  <g fill="#00F0FF" opacity="0.7">
    <circle cx="180" cy="175" r="2.5"/>
    <circle cx="180" cy="265" r="2.5"/>
    <circle cx="240" cy="120" r="2.5"/>
    <circle cx="220" cy="320" r="2.5"/>
    <circle cx="620" cy="175" r="2.5"/>
    <circle cx="620" cy="265" r="2.5"/>
    <circle cx="560" cy="120" r="2.5"/>
    <circle cx="580" cy="320" r="2.5"/>
  </g>

  <!-- Main hexagonal node -->
  <g transform="translate(400, 220)">
    <!-- Outer hex glow -->
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"
             fill="none" stroke="#FF6600" stroke-width="1" opacity="0.4"
             transform="rotate(3)"/>

    <!-- Main hex -->
    <polygon points="0,-72 62,-36 62,36 0,72 -62,36 -62,-36"
             fill="#0A0A0F" stroke="#00F0FF" stroke-width="2.5"
             filter="url(#cyanGlow)" transform="rotate(3)"/>

    <!-- Inner hex -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25"
             fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.4"
             transform="rotate(3)"/>

    <!-- Inner detail: node symbol -->
    <g transform="rotate(3)">
      <!-- Central dot -->
      <circle cx="0" cy="0" r="6" fill="#00F0FF" opacity="0.9" filter="url(#cyanGlow)"/>

      <!-- Connecting lines inside hex (network node visual) -->
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="0" x2="26" y2="15" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="0" x2="-26" y2="15" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>

      <!-- Sub-nodes -->
      <circle cx="0" cy="-30" r="3.5" fill="#0A0A0F" stroke="#00F0FF" stroke-width="1.5"/>
      <circle cx="26" cy="15" r="3.5" fill="#0A0A0F" stroke="#00F0FF" stroke-width="1.5"/>
      <circle cx="-26" cy="15" r="3.5" fill="#0A0A0F" stroke="#00F0FF" stroke-width="1.5"/>

      <!-- Fuel gauge bars (bottom of hex) -->
      <rect x="-18" y="32" width="6" height="10" fill="#00F0FF" opacity="0.8" rx="1"/>
      <rect x="-7" y="28" width="6" height="14" fill="#00F0FF" opacity="0.6" rx="1"/>
      <rect x="4" y="30" width="6" height="12" fill="#FF6600" opacity="0.7" rx="1"/>
      <rect x="15" y="34" width="6" height="8" fill="#FF6600" opacity="0.5" rx="1"/>
    </g>
  </g>

  <!-- "PLUTARCH" main text -->
  <g transform="translate(400, 380)">
    <!-- Main text -->
    <text text-anchor="middle" font-family="'Courier New', 'Consolas', monospace"
          font-size="72" font-weight="bold" letter-spacing="12"
          fill="#00F0FF" filter="url(#textGlow)" y="0">
      PLUTARCH
    </text>

    <!-- Scanline cut through text -->
    <rect x="-280" y="-22" width="560" height="2" fill="#0A0A0F" opacity="0.7"/>
    <rect x="-280" y="-8" width="560" height="1.5" fill="#0A0A0F" opacity="0.5"/>
    <rect x="-280" y="8" width="560" height="1" fill="#0A0A0F" opacity="0.4"/>
  </g>

  <!-- Glitch offset duplicate (magenta shifted) -->
  <g clip-path="url(#glitchSlice1)">
    <text x="403" y="380" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace"
          font-size="72" font-weight="bold" letter-spacing="12"
          fill="#FF8533" opacity="0.7">
      PLUTARCH
    </text>
  </g>
  <g clip-path="url(#glitchSlice2)">
    <text x="397" y="380" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace"
          font-size="72" font-weight="bold" letter-spacing="12"
          fill="#FF6600" opacity="0.5">
      PLUTARCH
    </text>
  </g>

  <!-- Connecting line from hex to text -->
  <line x1="400" y1="295" x2="400" y2="325" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="395" y1="325" x2="405" y2="325" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <g transform="translate(400, 420)">
    <!-- Thin rule -->
    <line x1="-140" y1="0" x2="-10" y2="0" stroke="#00F0FF" stroke-width="0.8" opacity="0.5"/>
    <line x1="10" y1="0" x2="140" y2="0" stroke="#00F0FF" stroke-width="0.8" opacity="0.5"/>

    <text text-anchor="middle" font-family="'Courier New', 'Consolas', monospace"
          font-size="14" letter-spacing="8" fill="#2A2D3E" y="25">
      TRIBAL NETWORKS
    </text>
  </g>

  <!-- Corner brackets (HUD frame) -->
  <g stroke="#00F0FF" stroke-width="1.5" fill="none" opacity="0.3">
    <!-- Top-left -->
    <polyline points="30,30 30,60"/>
    <polyline points="30,30 60,30"/>
    <!-- Top-right -->
    <polyline points="770,30 770,60"/>
    <polyline points="770,30 740,30"/>
    <!-- Bottom-left -->
    <polyline points="30,570 30,540"/>
    <polyline points="30,570 60,570"/>
    <!-- Bottom-right -->
    <polyline points="770,570 770,540"/>
    <polyline points="770,570 740,570"/>
  </g>

  <!-- HUD data readouts -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#2A2D3E">
    <text x="40" y="50">SYS::PLUTARCH v1.0</text>
    <text x="640" y="50">NET::ONLINE</text>
    <text x="40" y="560">NODE::ACTIVE</text>
    <text x="660" y="560">FUEL::NOMINAL</text>
  </g>

  <!-- Scanline overlay -->
  <rect width="800" height="600" fill="url(#scanlines)" opacity="0.3"/>
</svg>